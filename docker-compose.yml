version: '3.8'

services:
  news-bot:
    image: docker.vietnh.io.vn/news-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-bot
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    
    # Environment variables - thêm vào hoặc dùng .env file
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - GROUP_CHAT_ID=${GROUP_CHAT_ID}
      - TOPIC_ID=${TOPIC_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    
    # Nếu dùng .env file (recommend)
    env_file:
      - .env
    
    # Volumes (optional) - để lưu logs hoặc cache
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    
    # Resources limits (tùy chọn)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network (mặc định dùng bridge network)
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
